name: Publish scheduled posts

on:
  schedule:
    # Backup HTTP a cada 5 min (UTC). Complementa o serviço Railway cron.
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: publish-scheduled
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Publish due scheduled posts
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Configure os secrets SITE_URL e CRON_SECRET no repositório."
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -X GET "${SITE_URL}/api/cron/publish-scheduled" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "HTTP $code"
            exit 1
          fi
