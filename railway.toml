[build]
builder = "NIXPACKS"

[deploy]
releaseCommand = "npm run db:sync"
startCommand = "npm run start:prod"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Posts agendados: npm run railway:cron:setup ou npm run github:cron:setup
# Cron Railway: */5 * * * * UTC via railway.cron.toml no serviço eight-publish-cron
